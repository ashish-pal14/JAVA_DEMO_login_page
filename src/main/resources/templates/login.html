<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<main class="page-shell center">
    <section class="card auth-card">
        <p class="eyebrow">Workshop access</p>
        <h1>Sign in to continue</h1>
        <p class="lead">Use the account you created on the sign-up page to enter the shop.</p>

        <div class="success" th:if="${signupSuccess}" th:text="${signupSuccess}"></div>
        <div class="error" th:if="${loginError}" th:text="${loginError}"></div>

        <form th:action="@{/login}" th:object="${loginForm}" method="post" class="form-grid">
            <label>
                <span>Username</span>
                <input type="text" th:field="*{username}" placeholder="Enter your username" />
                <small class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></small>
            </label>

            <label>
                <span>Password</span>
                <input type="password" th:field="*{password}" placeholder="Enter your password" />
                <small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
            </label>

            <button type="submit">Sign In</button>
        </form>

        <p class="form-note">Need an account? <a th:href="@{/signup}">Sign up here</a>.</p>
    </section>
</main>
</body>
</html>
