<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workshop Store</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<main class="page-shell dashboard-shell">
    <section class="hero-panel dashboard-hero">
        <p class="eyebrow">Signed in successfully</p>
        <h1>Welcome, <span th:text="${username}">user</span></h1>
        <p class="lead">You are now inside the workshop store dashboard with catalog, cart, orders, and support routes.</p>

        <div class="dashboard-stats">
            <article>
                <strong th:text="${categoryCount}">0</strong>
                <span>Categories</span>
            </article>
            <article>
                <strong th:text="${cartItemCount}">0</strong>
                <span>Items in cart</span>
            </article>
            <article>
                <strong th:text="${cartTotal}">$0</strong>
                <span>Cart total</span>
            </article>
        </div>

        <div class="action-row nav-row">
            <a class="link-button" th:href="@{/catalog}">Catalog</a>
            <a class="link-button link-button-secondary" th:href="@{/cart}">Cart</a>
            <a class="link-button link-button-secondary" th:href="@{/orders}">Orders</a>
            <a class="link-button link-button-secondary" th:href="@{/support}">Support</a>
        </div>
    </section>

    <section class="card shop-grid">
        <p class="eyebrow">Featured products</p>
        <article class="shop-item" th:each="product : ${featuredProducts}">
            <span th:text="${product.status}">Hot</span>
            <div>
                <h2 th:text="${product.name}">Product</h2>
                <p th:text="${product.description}">Description</p>
                <div class="card-footer">
                    <strong th:text="${product.price}">$0</strong>
                    <a class="text-link" th:href="@{/product/{id}(id=${product.id})}">Open</a>
                </div>
            </div>
        </article>
    </section>
</main>
</body>
</html>
